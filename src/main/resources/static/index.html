<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영진위 KOBIS 박스오피스</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <h1>영진위 KOBIS 박스오피스</h1>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="daily">일별 박스오피스</button>
    <button class="tab-btn" data-tab="weekly">주간 박스오피스</button>
    <button class="tab-btn" data-tab="search">영화 검색</button>
  </nav>
</header>

<main>

  <!-- 일별 박스오피스 -->
  <section id="tab-daily" class="tab-panel active">
    <div class="controls">
      <label>기준일:
        <input type="date" id="daily-date">
      </label>
      <button id="daily-fetch-btn" class="btn-primary">조회</button>
    </div>
    <div id="daily-range" class="range-label"></div>
    <div id="daily-result"></div>
  </section>

  <!-- 주간 박스오피스 -->
  <section id="tab-weekly" class="tab-panel">
    <div class="controls">
      <label>기준일:
        <input type="date" id="weekly-date">
      </label>
      <label>구분:
        <select id="weekly-gb">
          <option value="0">주간 (월~일)</option>
          <option value="1">주말 (금~일)</option>
          <option value="2">주중 (월~목)</option>
        </select>
      </label>
      <button id="weekly-fetch-btn" class="btn-primary">조회</button>
    </div>
    <div id="weekly-range" class="range-label"></div>
    <div id="weekly-result"></div>
  </section>

  <!-- 영화 검색 -->
  <section id="tab-search" class="tab-panel">
    <div class="controls">
      <input type="text" id="movie-search-input" placeholder="영화명을 입력하세요 (예: 기생충)">
      <button id="movie-search-btn" class="btn-primary">검색</button>
    </div>
    <div id="search-result"></div>
  </section>

</main>

<!-- 영화 상세정보 모달 -->
<div id="movie-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <button class="modal-close" id="modal-close-btn">&#10005;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/boxoffice.js"></script>
<script src="/js/movie.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
